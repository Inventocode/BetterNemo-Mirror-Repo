<html>

<head>
  <meta charset="UTF-8">

  <meta content="email=no" name="format-detection" />
  <meta name="format-detection" content="telephone=no" />

<body>
  <!-- 悬浮球 -->
  <div class="float-ball" id="floatBall">
    <i class="fa-solid fa-gear"></i>
  </div>

  <!-- 悬浮窗口 -->
  <div class="float-window" id="floatWindow">
    <div class="window-header">
      <h3><i class="fa-solid fa-cube"></i> NemoHooker</h3>
      <button class="close-btn" id="closeBtn">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="window-content"></div>
  </div>
  <div id="workspace"></div>
  <div id="react_root"></div>
  <div class='panel_mask'></div>
  <div id='test'></div>
  <div id='highlight_test'></div>
  <script src="https://cdn.jsdelivr.net/npm/eruda" defer></script>
  <script>
    const NemoHookerVersion = "Indev";
    function hook(id, name, getThis = false) {
      var ready = false;
      var map = new Map();
      var proxy = {
        configurable: true,
        get: function () {
          return map.get(this);
        },
        set: function (value) {
          map.set(this, value);
          if (!getThis) window[name] = value;
          else window[name] = this;
          ready = true;
          return void 0;
        },
      };
      Object.defineProperty(Object.prototype, id, proxy);
    }
    hook("./src/webview/runtime/index.ts", "HookRuntime");
    hook("./src/common/redux/index.ts", "HookRedux");
    hook("./node_modules/@crc/stage/build/core/actors/brush.js", "HookBrush");
    hook("./node_modules/@crc/stage/build/core/utils/index.js", "HookUtils");
    hook("./node_modules/@crc/blink/dist/core/di/index.js", "HookDi");
    hook("./node_modules/@crc/stage/build/core/scenes/scene.js", "HookScene");
    hook("./src/i18n/zh_CN.ts", "HookMsgZhCN");
    console.log(
      "%cWelcome to ❤ NemoHooker - " +
      NemoHookerVersion +
      " ❤ for Nemo o(*￣▽￣*)ブ",
      "\n  color: rgb(22, 93, 255);\n  text-shadow: 0 1px 0 #404182;"
    );
    function get_run_mgr() {
      if (!window['HookRuntime']) return;
      return HookRuntime.exports.get_webview_runtime().heart.runtime_manager.run_mgr;
    }
  </script>
  <script defer src="workspace-scripts/storage.js"></script>
  <script defer src="workspace-scripts/cat-block.js"></script>
  <script defer src="workspace-scripts/float-ball.js"></script>
  <script defer src="workspace-scripts/utils.js"></script>
  <script defer src="workspace-scripts/prototype-inject.js"></script>
  <script defer src="workspace-scripts/blocks.js"></script>
  <script defer src="workspace-scripts/toolbox.js"></script>
  <script defer src="workspace-scripts/domain-functions.js"></script>
</body>

</html>
